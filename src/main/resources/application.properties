# Database Configuration
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Jackson configuration to handle Hibernate lazy loading
spring.jackson.serialization.fail-on-empty-beans=false
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Google Gemini AI Configuration
gemini.api.key=${GEMINI_API_KEY}
gemini.api.model=gemini-3-flash-preview

# Amadeus API Configuration
amadeus.api.key=${AMADEUS_API_KEY}
amadeus.api.secret=${AMADEUS_API_SECRET}
amadeus.api.timeout=30

# Resilience4j Configuration for Amadeus
resilience4j.circuitbreaker.instances.amadeus.sliding-window-size=10
resilience4j.circuitbreaker.instances.amadeus.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.amadeus.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.amadeus.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.amadeus.permitted-number-of-calls-in-half-open-state=3

resilience4j.retry.instances.amadeus.max-attempts=3
resilience4j.retry.instances.amadeus.wait-duration=2s
resilience4j.retry.instances.amadeus.exponential-backoff-multiplier=2

# Cache Configuration
spring.cache.cache-names=flightSearches,airportLookup
spring.cache.caffeine.spec=expireAfterWrite=10m,maximumSize=100
spring.cache.type=caffeine

# Disable Redis auto-configuration to prevent connection errors
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Email Configuration (Gmail SMTP)
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.from=${MAIL_FROM}

# Async Configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
